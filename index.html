<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>ROI Portfolio Dashboard — Teradyne</title>
<style>
body.sec-pending *{display:none!important;}
body.sec-pending .sec-block{display:flex!important;}
body.sec-blocked *{display:none!important;}
body.sec-blocked .sec-block{display:flex!important;}
.sec-block{max-width:560px;margin:80px auto;padding:32px;border:1px solid #3a4060;border-radius:16px;background:#1a1f35;text-align:center;font-family:system-ui,sans-serif;flex-direction:column;align-items:center;}
.sec-block h2{margin:0 0 12px;color:#f87171;font-size:22px;}
.sec-block p{color:#7e8ba8;font-size:14px;margin:6px 0;}
</style>
<script>
(function(){
  var S={validToken:'jeffersonxuinteradyne',allowDirect:true};
  function block(t,m){document.body.classList.remove('sec-pending');document.body.classList.add('sec-blocked');document.body.insertAdjacentHTML('afterbegin','<div class="sec-block"><span style="font-size:48px">&#x1F512;</span><h2>'+t+'</h2><p>'+m+'</p></div>');}
  function allow(){document.body.classList.remove('sec-pending','sec-blocked');}
  function check(){var raw=new URLSearchParams(location.search).get('access');var token=raw?raw.replace(/ /g,'+'):raw;if(S.allowDirect&&token===S.validToken){allow();return;}block('Access Denied','Use direct link with access token.');}
  document.addEventListener('DOMContentLoaded',check);
})();
</script>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--card:#16213e;--inp:#0d1b2a;
  --bdr:#2a2a4a;--acc:#ff6b35;--acc2:#ff8c5a;--ink:#e8e8f0;--ink2:#a0a0c0;--muted:#6a6a8a;
  --green:#27ae60;--red:#e74c3c;--yellow:#f39c12;--blue:#3498db;
  --r:10px;--shd:0 4px 20px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:2px solid var(--acc);z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand h1{margin:0;font-size:17px;font-weight:800;letter-spacing:-.02em;}
.brand h1 span{color:var(--acc);}
.port-badge{font-size:11px;font-weight:700;background:rgba(255,107,53,.15);color:var(--acc);border:1px solid rgba(255,107,53,.3);border-radius:6px;padding:3px 10px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.last-refresh{font-size:11px;color:var(--muted);}

/* ── Shell ── */
.shell{padding:72px 24px 32px;max-width:1600px;margin:0 auto;}

/* ── Section header ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.sec-header h2{margin:0;font-size:20px;font-weight:800;}

/* ── KPI Summary ── */
.kpi-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
.kpi-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc);}
.kpi-card.green::before{background:var(--green);}
.kpi-card.red::before{background:var(--red);}
.kpi-card.yellow::before{background:var(--yellow);}
.kpi-card.blue::before{background:var(--blue);}
.kpi-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.kpi-value{font-size:1.3rem;font-weight:800;}
.kpi-sub{font-size:.75rem;color:var(--ink2);margin-top:4px;}

/* ── Search/Filter ── */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
.filter-bar input,.filter-bar select{padding:8px 14px;background:var(--inp);border:1px solid var(--bdr);border-radius:8px;color:var(--ink);font-size:13px;font-family:inherit;}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--acc);}
.filter-bar input{min-width:250px;}

/* ── Buttons ── */
.btn-primary{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-weight:800;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-primary:hover{background:var(--acc2);}
.btn-ghost{background:var(--inp);border:1px solid var(--bdr);color:var(--ink);border-radius:8px;padding:8px 16px;font-weight:700;font-size:12px;cursor:pointer;}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc);}
.btn-secondary{background:transparent;border:1px solid var(--acc);color:var(--acc);border-radius:8px;padding:8px 16px;font-weight:700;font-size:12px;cursor:pointer;}
.btn-secondary:hover{background:var(--acc);color:#fff;}

/* ── Hub Cards ── */
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.hub-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;box-shadow:var(--shd);transition:all .2s;position:relative;overflow:hidden;}
.hub-card:hover{border-color:var(--acc);box-shadow:0 4px 30px rgba(255,107,53,.15);transform:translateY(-2px);}
.hub-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.hub-card.go::before{background:var(--green);}
.hub-card.nogo::before{background:var(--red);}
.hub-card.caution::before{background:var(--yellow);}
.hub-card.unknown::before{background:var(--muted);}
.hc-name{font-size:16px;font-weight:800;margin-bottom:6px;}
.hc-bu{font-size:12px;color:var(--acc);font-weight:600;margin-bottom:10px;}
.hc-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.hc-metric{text-align:center;padding:8px;background:var(--inp);border-radius:6px;}
.hc-metric .ml{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.hc-metric .mv{font-size:1rem;font-weight:800;margin-top:2px;}
.hc-metric .mv.pos{color:var(--green);}
.hc-metric .mv.neg{color:var(--red);}
.hc-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.hc-meta{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px;}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;}
.badge-go{background:rgba(39,174,96,.2);color:var(--green);border:1px solid var(--green);}
.badge-caution{background:rgba(243,156,18,.2);color:var(--yellow);border:1px solid var(--yellow);}
.badge-nogo{background:rgba(231,76,60,.2);color:var(--red);border:1px solid var(--red);}
.badge-pending{background:rgba(106,106,138,.2);color:var(--muted);border:1px solid var(--muted);}

/* ── Add Hub Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;width:min(520px,100%);padding:24px;}
.modal-box h2{margin:0 0 16px;font-size:18px;font-weight:800;color:var(--acc);}
.modal-box label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:12px;}
.modal-box input,.modal-box select{width:100%;padding:8px 12px;background:var(--inp);border:1px solid var(--bdr);border-radius:8px;color:var(--ink);font-size:13px;}
.modal-box input:focus{outline:none;border-color:var(--acc);}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 20px;font-size:13px;z-index:600;transition:transform .3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{border-color:rgba(39,174,96,.3);color:var(--green);}
#toast.error{border-color:rgba(231,76,60,.3);color:var(--red);}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;}
.empty-state h3{font-size:18px;color:var(--ink2);margin:0 0 8px;}
.empty-state p{font-size:13px;}

/* ── Settings Modal ── */
.settings-modal .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── Footer ── */
.footer{text-align:center;padding:20px;color:var(--muted);font-size:.72rem;border-top:1px solid var(--bdr);margin-top:40px;}

@media(max-width:768px){
  .kpi-bar{grid-template-columns:1fr 1fr;}
  .hub-grid{grid-template-columns:1fr;}
  .filter-bar{flex-direction:column;}
  .filter-bar input{min-width:100%;}
}
</style>
</head>

<div id="toast"></div>

<!-- Topbar -->
<div id="topbar">
  <div class="brand">
    <svg viewBox="0 0 32 32" width="32" height="32"><rect width="32" height="32" rx="6" fill="#ff6b35"/><path d="M8 22L16 10L24 22H8Z" fill="#fff"/><circle cx="16" cy="18" r="2" fill="#ff6b35"/></svg>

<!-- Main Shell -->
<div class="shell">
  <!-- KPI Summary -->
  <div class="kpi-bar" id="kpiBar">

<script>
'use strict';

// ── Config ──
const CONFIG = (function(){
  const s = JSON.parse(localStorage.getItem('roiPortfolioConfig')||'{}');
  const a = JSON.parse(localStorage.getItem('roiStudioConfig')||'{}');
  const b = JSON.parse(localStorage.getItem('agentStudioConfig')||'{}');
  return {
    supabaseUrl:     s.supabaseUrl     || a.supabaseUrl     || b.supabaseUrl     || '',
    supabaseAnonKey: s.supabaseAnonKey || a.supabaseAnonKey || b.supabaseAnonKey || '',
  };
})();

const toast = (msg,type='') => {
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type?'show '+type:'show';setTimeout(()=>t.className='',3200);
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n => n==null?'—':Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
const fK  = n => n==null?'—':'$'+fmt(Math.round(n))+'K';
const fP  = n => n==null?'—':(n*100).toFixed(1)+'%';

let allHubs = [];
let filteredHubs = [];

// ── Settings ──
function openSettings(){
  document.getElementById('cfgSbUrl').value = CONFIG.supabaseUrl||'';
  document.getElementById('cfgSbKey').value = CONFIG.supabaseAnonKey||'';
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show');}
function saveSettings(){
  const updated = {
    supabaseUrl: document.getElementById('cfgSbUrl').value.trim(),
    supabaseAnonKey: document.getElementById('cfgSbKey').value.trim()
  };
  localStorage.setItem('roiPortfolioConfig', JSON.stringify(updated));
  Object.assign(CONFIG, updated);
  closeSettings();toast('Settings saved ✓','success');
  refreshAll();
}
async function testConnection(){
  try{
    const r=await fetch(CONFIG.supabaseUrl+'/rest/v1/?apikey='+CONFIG.supabaseAnonKey,{
      headers:{'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey}
    });
    if(r.ok) toast('Connected ✓','success'); else toast('Failed: HTTP '+r.status,'error');
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── Add Hub Modal ──
function openAddHub(){document.getElementById('addHubModal').classList.add('show');}
function closeAddHub(){document.getElementById('addHubModal').classList.remove('show');}
function registerHub(){
  const name = document.getElementById('addName').value.trim();
  const url  = document.getElementById('addUrl').value.trim();
  if(!name||!url){toast('Fill Name and URL','error');return;}
  const hub = {
    hub_id: name.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
    hub_name: name,
    product_code: document.getElementById('addCode').value.trim()||'—',
    bu: document.getElementById('addBU').value,
    phase: document.getElementById('addPhase').value,
    owner: document.getElementById('addOwner').value.trim(),
    hub_url: url,
    status: 'live',
    roi_status: 'pending',
    npv: null, irr: null, dev_cost: null,
    created_at: new Date().toISOString()
  };
  const hubs = JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
  hubs.push(hub);
  localStorage.setItem('roiHubRegistry', JSON.stringify(hubs));
  closeAddHub();
  ['addName','addCode','addUrl'].forEach(id=>document.getElementById(id).value='');
  toast('Hub registered ✓','success');
  refreshAll();
}

// ── Data Loading ──
async function refreshAll(){
  allHubs = [];

  // Load from localStorage
  const local = JSON.parse(localStorage.getItem('roiHubRegistry')||'[]');
  local.forEach(h => allHubs.push(h));

  // Load from Supabase
  if(CONFIG.supabaseUrl && CONFIG.supabaseAnonKey){
    try{
      const headers = {'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey};
      const r = await fetch(CONFIG.supabaseUrl+'/rest/v1/roi_hub_registry?select=*&order=hub_name.asc',{headers});
      if(r.ok){
        const remote = await r.json();
        remote.forEach(h => {
          if(!allHubs.find(a=>a.hub_id===h.hub_id)){
            allHubs.push(h);
          } else {
            const idx = allHubs.findIndex(a=>a.hub_id===h.hub_id);
            allHubs[idx] = {...allHubs[idx], ...h};
          }
        });
      }
    }catch(e){console.warn('Supabase load error:',e);}
  }

  // Filter out archived
  allHubs = allHubs.filter(h => h.status !== 'archived');

  // ── FIX #7: Fetch financial KPIs from each hub's data table ──
  for(let i=0; i<allHubs.length; i++){
    const h = allHubs[i];
    // First check if metadata has pre-computed KPIs
    if(h.metadata){
      let meta = h.metadata;
      if(typeof meta === 'string'){ try{ meta = JSON.parse(meta); }catch(e){} }
      if(meta && meta.npv != null) h.npv = meta.npv;
      if(meta && meta.irr != null) h.irr = meta.irr;
      if(meta && meta.dev_cost != null) h.dev_cost = meta.dev_cost;
      if(meta && meta.total_dev != null) h.dev_cost = meta.total_dev;
    }
    // If still no KPIs and we have a db_table, fetch from hub data
    if(h.npv == null && h.db_table && CONFIG.supabaseUrl && CONFIG.supabaseAnonKey){
      try{
        const headers = {'apikey':CONFIG.supabaseAnonKey,'Authorization':'Bearer '+CONFIG.supabaseAnonKey};
        const r = await fetch(CONFIG.supabaseUrl+'/rest/v1/'+h.db_table+'?select=*&order=updated_at.desc&limit=1',{headers});
        if(r.ok){
          const rows = await r.json();
          if(rows.length > 0){
            const row = rows[0];
            const devCosts = typeof row.dev_costs === 'string' ? JSON.parse(row.dev_costs||'{}') : (row.dev_costs||{});
            const revenue  = typeof row.revenue === 'string' ? JSON.parse(row.revenue||'{}') : (row.revenue||{});
            const params   = typeof row.params === 'string' ? JSON.parse(row.params||'{}') : (row.params||{});
            const wacc = (params.wacc||12)/100;
            const burden = (params.burden||30)/100;

            // Compute total dev cost
            let totalDev = 0;
            const N = 10;
            const devArr = new Array(N).fill(0);
            if(devCosts && typeof devCosts === 'object'){
              Object.keys(devCosts).forEach(cat => {
                const arr = devCosts[cat];
                if(Array.isArray(arr)){
                  for(let y=0; y<N; y++) devArr[y] += (arr[y]||0);
                }
              });
              totalDev = devArr.reduce((a,b)=>a+b, 0);
            }

            // Compute revenue from mid scenario
            let revArr = new Array(N).fill(0);
            let cogsArr = new Array(N).fill(0);
            if(revenue.mid){
              const mid = revenue.mid;
              for(let y=0; y<N; y++){
                const u = (mid.units&&mid.units[y])||0;
                const a = (mid.asp&&mid.asp[y])||0;
                const c = (mid.cogs&&mid.cogs[y])||0;
                revArr[y] = u * a;
                cogsArr[y] = u * c;
              }
            }

            // Simple P&L: PBIT = Revenue - COGS - Dev
            const pbit = revArr.map((r,y) => r - cogsArr[y] - devArr[y]);
            const npv = pbit.reduce((s,v,y) => s + v/Math.pow(1+wacc,y), 0);

            // IRR via bisection
            function calcIRR(cf){
              let lo=-0.5, hi=5.0;
              for(let it=0;it<100;it++){
                const mid2=(lo+hi)/2;
                const npv2=cf.reduce((s,v,i)=>s+v/Math.pow(1+mid2,i),0);
                if(npv2>0) lo=mid2; else hi=mid2;
              }
              return (lo+hi)/2;
            }
            const irr = calcIRR(pbit);

            h.npv = Math.round(npv);
            h.irr = irr;
            h.dev_cost = Math.round(totalDev);
          }
        }
      }catch(e){console.warn('Failed to fetch hub data for '+h.hub_id+':',e);}
    }
  }

  // Assign ROI status based on financial data
  allHubs.forEach(h => {
    if(h.npv !== undefined && h.npv !== null && h.irr !== undefined && h.irr !== null){
      if(h.npv > 0 && h.irr > 0.12) h.roi_status = 'go';
      else if(h.npv < 0 && h.irr < 0.08) h.roi_status = 'nogo';
      else h.roi_status = 'caution';
    } else {
      h.roi_status = h.roi_status || 'pending';
    }
  });

  document.getElementById('lastRefresh').textContent = 'Updated: '+new Date().toLocaleTimeString();
  document.getElementById('footerDate').textContent = new Date().toLocaleDateString();
  applyFilters();
}

// ── Filters ──
function applyFilters(){
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  const bu     = document.getElementById('filterBU').value;
  const status = document.getElementById('filterStatus').value;
  const phase  = document.getElementById('filterPhase').value;

  filteredHubs = allHubs.filter(h => {
    if(search && !(h.hub_name||'').toLowerCase().includes(search) && !(h.product_code||'').toLowerCase().includes(search)) return false;
    if(bu && h.bu !== bu) return false;
    if(status && h.roi_status !== status) return false;
    if(phase && h.phase !== phase) return false;
    return true;
  });

  renderKPIs(filteredHubs);
  renderGrid(filteredHubs);
}

// ── KPI Rendering ──
function renderKPIs(hubs){
  document.getElementById('kTotalProducts').textContent = hubs.length;

  const goCount = hubs.filter(h=>h.roi_status==='go').length;
  const nogoCount = hubs.filter(h=>h.roi_status==='nogo').length;
  const cautionCount = hubs.filter(h=>h.roi_status==='caution').length;
  document.getElementById('kGoRatio').textContent = goCount+' / '+nogoCount;
  document.getElementById('kGoSub').textContent = goCount+' Go · '+cautionCount+' Caution · '+nogoCount+' No-Go';

  const hubsWithNPV = hubs.filter(h=>h.npv!=null);
  const avgNPV = hubsWithNPV.length ? hubsWithNPV.reduce((a,h)=>a+(h.npv||0),0)/hubsWithNPV.length : null;
  document.getElementById('kAvgNPV').textContent = avgNPV!=null ? fK(avgNPV) : '—';

  const hubsWithIRR = hubs.filter(h=>h.irr!=null);
  const avgIRR = hubsWithIRR.length ? hubsWithIRR.reduce((a,h)=>a+(h.irr||0),0)/hubsWithIRR.length : null;
  document.getElementById('kAvgIRR').textContent = avgIRR!=null ? fP(avgIRR) : '—';

  const totalDev = hubs.reduce((a,h)=>a+(h.dev_cost||0),0);
  document.getElementById('kTotalDev').textContent = totalDev>0 ? '$'+(totalDev/1000).toFixed(1)+'M' : '—';

  const bus = [...new Set(hubs.map(h=>h.bu).filter(Boolean))];
  document.getElementById('kBUs').textContent = bus.length;
}

// ── Grid Rendering ──
function renderGrid(hubs){
  const grid = document.getElementById('hubGrid');
  if(!hubs.length){
    grid.innerHTML = '<div class="empty-state"><div class="es-icon">&#x1F4CA;</div><h3>No ROI Hubs found</h3><p>Create hubs in ROI Agent Studio or click "Add Hub" to register one manually.</p></div>';
    return;
  }
  let html = '';
  hubs.forEach((h,i) => {
    const st = h.roi_status||'pending';
    const badgeClass = st==='go'?'badge-go':st==='nogo'?'badge-nogo':st==='caution'?'badge-caution':'badge-pending';
    const cardClass = st==='go'?'go':st==='nogo'?'nogo':st==='caution'?'caution':'unknown';
    const npvClass = h.npv!=null?(h.npv>0?'pos':'neg'):'';
    const irrClass = h.irr!=null?(h.irr>0.12?'pos':'neg'):'';

    html += `<div class="hub-card ${cardClass}">
      <div class="hc-name">${esc(h.hub_name||h.hub_id)}</div>
      <div class="hc-bu">${esc(h.bu||'—')} · ${esc(h.product_code||'—')} · ${esc(h.phase||'—')}</div>
      <div class="hc-metrics">
        <div class="hc-metric"><div class="ml">NPV</div><div class="mv ${npvClass}">${h.npv!=null?fK(h.npv):'—'}</div></div>
        <div class="hc-metric"><div class="ml">IRR</div><div class="mv ${irrClass}">${h.irr!=null?fP(h.irr):'—'}</div></div>
        <div class="hc-metric"><div class="ml">Dev Cost</div><div class="mv">${h.dev_cost!=null?fK(h.dev_cost):'—'}</div></div>
      </div>
      <div class="hc-bottom">
        <div class="hc-meta">
          <span>&#x1F464; ${esc(h.owner||'—')}</span>
          <span>&#x1F4C5; ${h.created_at?new Date(h.created_at).toLocaleDateString():'—'}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="badge ${badgeClass}">${st==='go'?'● GO':st==='nogo'?'● NO-GO':st==='caution'?'● CAUTION':'● PENDING'}</span>
          ${h.hub_url?`<a href="${esc(h.hub_url)}" target="_blank" class="btn-primary" style="text-decoration:none;font-size:11px;padding:6px 12px;">&#x1F517; Open</a>`:''}
        </div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

// ── Export CSV ──
function exportCSV(){
  const rows = [['Product Name','Product Code','Business Unit','Phase','Owner','NPV ($K)','IRR','Dev Cost ($K)','Status','Hub URL','Created']];
  filteredHubs.forEach(h => {
    rows.push([
      h.hub_name||'', h.product_code||'', h.bu||'', h.phase||'', h.owner||'',
      h.npv!=null?Math.round(h.npv):'', h.irr!=null?(h.irr*100).toFixed(1)+'%':'',
      h.dev_cost!=null?Math.round(h.dev_cost):'', h.roi_status||'',
      h.hub_url||'', h.created_at?new Date(h.created_at).toLocaleDateString():''
    ]);
  });
  const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'ROI_Portfolio_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exported ✓','success');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function(){
  refreshAll();
});
</script>
